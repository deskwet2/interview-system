<style>
    .bank-form { background: #f4f7f6; height: 100vh; padding: 40px; }
    .gold-border { border: 2px solid #d4af37; padding: 20px; background: white; }
</style>
<div class="bank-form">
    <div class="gold-border">
        <h2 id="main-header">Specialty CD Application</h2>
        <form>
            <label>Initial Deposit ($)</label>
            <input type="number" name="deposit_amount" min="25000" placeholder="Min 25,000" required>
            <label>Term Length</label>
            <select name="term_months">
                <option value="6">6 Months</option>
                <option value="12">12 Months</option>
            </select>
            <button type="submit" style="background:#d4af37; color:white;">Open Account</button>
        </form>
    </div>
</div>
