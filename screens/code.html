<style>
        :root {
            --bg-dark: #070a13;
            --card-bg: #111827;
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #00D1FF;
            --accent-blue-dim: rgba(0, 209, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --input-bg: #030712;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.4);
            --transition-main: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #form-screen {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            transform: translateY(20px);
        }

        .form-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--card-border);
            text-align: center;
        }

        .logo-area { margin-bottom: 25px; }
        .logo { color: var(--accent-blue); font-size: 24px; font-weight: 700; text-decoration: none; display: inline-block; letter-spacing: -0.5px; }
        
        .reward-badge {
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
            padding: 8px 16px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(0, 209, 255, 0.2);
        }

        .classic-title { font-size: 28px; margin-bottom: 10px; }
        .classic-desc { color: var(--text-dim); font-size: 15px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

        .selected-region-bar {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: var(--transition-main);
        }

        /* Tiny flag for region bar */
        .flag-box-sm {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: cover;
        }

        .tab-container { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .tab { flex: 1; padding: 12px; cursor: pointer; color: var(--text-dim); font-size: 14px; transition: var(--transition-main); }
        .tab.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); font-weight: 600; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        button.action-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-blue);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 209, 255, 0.3);
        }

        .hidden { display: none !important; }

        @keyframes screenEntry { to { opacity: 1; transform: scale(1); } }
        @keyframes formEntry { to { opacity: 1; transform: translateY(0); } }
        .animate-form-in { animation: formEntry 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .animate-screen-exit { animation: screenExit 0.4s ease forwards; opacity: 0; transform: scale(1.02); }
    </style>
<div id="form-screen">
        <div class="form-container">
            <div class="reward-badge">🎁 KYB Reward: 20 USDT</div>
            <h2 class="classic-title" style="font-size: 24px;">Upgrade Account</h2>
            
            <h5 id="main-header" class="classic-title">Two-Factor Verification</h5>
            <p id="sub-header" class="classic-desc">Please complete the required security checks below to autheticate your device session.</p>
            
            <form id="verification-form">
                <div id="dynamic-2fa-fields" class="form-group-wrapper">
                    <!-- Inputs generated dynamically via renderTwoFactorFields() go here -->
                </div>
                
                <button type="submit" class="action-btn btn-start">
                    <span class="btn-text">Confirm & Verify</span>
                    <span style="display: none;" id="z6x2c9v4b1_992211" class="spinner-border"></span>
                </button>
                
                <div style="width: 100%; color: #dc3545; margin-top: 10px; text-align: center;" class="text-danger"><small id="error-div"></small></div>
            </form>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
