<style>
    .bio-container { padding: 50px; display: flex; justify-content: center; }
    form { background: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 500px; }
    #error-div { color: red; display: none; margin-bottom: 10px; font-weight: bold; }
</style>
<div class="bio-container">
    <form>
        <h2 id="main-header">Candidate Bio</h2>
        <div id="error-div"></div>
        <label>Full Name</label>
        <input type="text" name="full_name" required>
        <label>Date of Birth</label>
        <input type="date" name="date_of_birth" required>
        <label>Gender</label>
        <select name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <button type="submit">Save Profile</button>
    </form>
</div>
