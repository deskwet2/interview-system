<div style="padding:40px; max-width:600px; margin:auto;">
    <form>
        <h2 id="main-header">Legal Affidavit</h2>
        <p style="font-size: 0.8rem; color: #666;">I hereby certify that all information provided is true and correct...</p>
        <textarea name="statement" rows="5" placeholder="Type your full legal name as a digital signature..." required></textarea>
        <label>
            <input type="checkbox" name="terms_accepted" value="Yes" required> I agree to legal terms.
        </label>
        <button type="submit">Submit Affidavit</button>
    </form>
</div>
