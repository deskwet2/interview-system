<!DOCTYPE html>
<html>
<head>
    <title>Examiner Command Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; overflow: hidden; }
        
        /* Sidebar & Header Styles */
        #audio-lock { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(28, 40, 51, 0.98); z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction:column; color:white; text-align:center; }
        #sidebar { width: 280px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #1a252f; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #34495e; }
        #candidate-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .candidate-item { padding: 12px; margin-bottom: 8px; background: #3e5871; border-radius: 6px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .candidate-item:hover { background: #1abc9c; }
        .candidate-item.active { background: #1abc9c; border-left: 4px solid #fff; }
        .cat-tag { font-size: 0.7rem; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 10px; text-transform: uppercase; }

        #content-wrapper { flex-grow: 1; display: flex; flex-direction: row; height: 100%; }

        /* Column 1: Commands */
        #command-section { width: 380px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .section-header { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee; font-weight: bold; }
        
        /* Custom Header Editor */
        #header-editor { padding: 15px; background: #fff9e6; border-bottom: 1px solid #ffeaa7; }
        .editor-input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 0.85rem; }

        .command-grid { padding: 15px; overflow-y: auto; flex-grow: 1; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; text-align: left; transition: 0.2s; position: relative; }
        .btn-cmd { background: #f0f2f5; color: #1c1e21; border: 1px solid #ccd0d5; }
        .btn-cmd:hover { background: #e4e6eb; }
        .btn-action { background: #0084ff; color: white; }
        .btn-danger { background: #ff4757; color: white; margin-bottom: 20px; }

        /* Column 2: Transcript */
        #chat-section { flex-grow: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; position: relative; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-examiner { align-self: flex-end; background: #dcf8c6; }
        .msg-candidate { align-self: flex-start; background: #fff; }
        .msg-time { display: block; font-size: 0.7rem; color: #888; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div id="audio-lock">
    <h2>Bank Interview System</h2>
    <p>Please click to activate control panel sounds and tools.</p>
    <button onclick="unlockAudio()" class="btn-action" style="width:auto; padding: 15px 40px;">Activate Dashboard</button>
</div>

<div id="sidebar">
    <div class="sidebar-header">Live Candidates</div>
    <div id="candidate-list"></div>
</div>

<div id="content-wrapper">
    <div id="command-section">
        <div class="section-header">Control Panel: <span id="current-category-label" style="color:#0084ff">Select User</span></div>
        
        <!-- Header Customizer (Point 4) -->
        <div id="header-editor">
            <small><strong>Screen Instruction Customizer:</strong></small>
            <input type="text" id="cust-header" class="editor-input" placeholder="Main Header (e.g., Final Step)">
            <input type="text" id="cust-subtext" class="editor-input" placeholder="Sub-text instruction...">
            <button onclick="resetHeaders()" style="padding:4px; font-size:0.7rem; width:auto; background:none; border:1px solid #ccc; color:#666;">Reset to Default</button>
        </div>

        <div id="typing-indicator" style="padding: 5px 20px; font-size: 0.8rem; color: #1abc9c; height: 20px;"></div>
        
        <div class="command-grid" id="command-buttons">
            <p style="color: #888; text-align: center; margin-top: 20px;">Select a candidate to load controls.</p>
        </div>
    </div>

    <div id="chat-section">
        <div class="section-header">Transcript: <strong id="selected-name">None</strong></div>
        <div id="chat-window"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentTarget = "";
    let currentTargetId = ""; 
    const loginSound = new Audio('login.mp3');
    const submitSound = new Audio('submit.mp3');

    // Refactored Library matching Screen IDs (Point 5)
    const taskLibrary = {
        general: [
            { name: "Welcome Screen", screenId: "WELCOME_01" },
            { name: "Personal Bio Form", screenId: "BIO_FORM_FULL" },
            { name: "Upload CV", screenId: "DOC_UPLOAD_ZONE" }
        ],
        banking: [
            { name: "Specialty CD Form", screenId: "CD_ACCOUNT_DETAIL" },
            { name: "Affidavit Signature", screenId: "AFFIDAVIT_LEGAL_01" },
            { name: "Account Opening", screenId: "KYC_COMPLEX_FORM" }
        ],
        data: [
            { name: "Data Analysis Task", screenId: "FIN_ANALYSIS_GRID" },
            { name: "System Logic Test", screenId: "LOGIC_EVAL_SCREEN" }
        ]
    };

    function unlockAudio() {
        loginSound.play().then(() => {
            loginSound.pause();
            document.getElementById('audio-lock').style.display = 'none';
        });
    }

    function resetHeaders() {
        document.getElementById('cust-header').value = "";
        document.getElementById('cust-subtext').value = "";
    }

    function loadCategoryCommands(category) {
        const grid = document.getElementById('command-buttons');
        const label = document.getElementById('current-category-label');
        label.innerText = category.toUpperCase();
        grid.innerHTML = `<button class="btn-danger" onclick="markWrong()">❌ Mark Last Answer Wrong</button><hr>`;

        const tasks = taskLibrary[category] || [];
        tasks.forEach(task => {
            const btn = document.createElement('button');
            btn.className = "btn-cmd";
            btn.innerHTML = `Send: ${task.name}`;
            btn.onclick = () => sendTask(task.name);
            grid.appendChild(btn);
        });
    }

    socket.on('candidate_online', (data) => {
        loginSound.play();
        const list = document.getElementById('candidate-list');
        const item = document.createElement('div');
        item.className = 'candidate-item';
        item.id = `user-${data.name}`;
        item.innerHTML = `<strong>${data.name}</strong> <span class="cat-tag">${data.category}</span>`;
        item.onclick = () => selectCandidate(data.name, data.category, data.id);
        list.appendChild(item);
    });

    function selectCandidate(name, category, id) {
        currentTarget = name;
        currentTargetId = id;
        document.getElementById('selected-name').innerText = name;
        document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`user-${name}`);
        if(activeItem) activeItem.classList.add('active');
        loadCategoryCommands(category);
    }

    // Point 2: Trigger reset and notification on candidate side
    function markWrong() {
        if(!currentTargetId) return alert("Select a candidate.");
        socket.emit('mark_wrong', { candidateId: currentTargetId });
        addMessage('examiner', `<span style="color:red">⚠️ Error Notification Sent to ${currentTarget}</span>`);
    }

    // Point 3 & 4: Sending full screen triggers with custom text
    function sendTask(screenName) {
        if(!currentTargetId) return alert("Select a candidate.");
        
        const customH = document.getElementById('cust-header').value;
        const customS = document.getElementById('cust-subtext').value;

        socket.emit('trigger_screen', { 
            candidateId: currentTargetId, 
            screenName: screenName,
            customHeader: customH,
            customSubHeader: customS
        });
        
        addMessage('examiner', `Switched screen to: <strong>${screenName}</strong>`);
    }

    socket.on('notify_submission', (data) => {
        if(data.name === currentTarget) {
            submitSound.play();
            addMessage('candidate', `<strong>[${data.screenId || 'Submission'}]</strong><br>${data.answer}`);
        }
    });

    function addMessage(sender, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg msg-${sender}`;
        div.innerHTML = `${text} <span class="msg-time">${new Date().toLocaleTimeString()}</span>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    socket.on('is_typing', (name) => {
        if(name === currentTarget) {
            document.getElementById('typing-indicator').innerText = name + " is interacting with form...";
            setTimeout(() => { document.getElementById('typing-indicator').innerText = ""; }, 2000);
        }
    });
</script>
</body>
</html>
