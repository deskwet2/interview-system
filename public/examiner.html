<!DOCTYPE html>
<html>
<head>
    <title>Examiner Command Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; overflow: hidden; }
        
        #audio-lock { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(28, 40, 51, 0.98); z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction:column; color:white; text-align:center; }
        #sidebar { width: 280px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #1a252f; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #34495e; }
        #candidate-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .candidate-item { padding: 12px; margin-bottom: 8px; background: #3e5871; border-radius: 6px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .candidate-item:hover { background: #1abc9c; }
        .candidate-item.active { background: #1abc9c; border-left: 4px solid #fff; }
        .cat-tag { font-size: 0.7rem; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 10px; text-transform: uppercase; }

        #content-wrapper { flex-grow: 1; display: flex; flex-direction: row; height: 100%; }

        /* Column 1: Commands */
        #command-section { width: 380px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .section-header { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* Point 2: Individual Command Styles */
        .command-container { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: #fafafa; }
        .command-main { display: flex; padding: 5px; background: #fff; align-items: center; }
        .btn-send-now { flex-grow: 1; padding: 10px; background: #0084ff; color: white; border: none; font-weight: 600; cursor: pointer; text-align: left; }
        .btn-edit-toggle { padding: 10px; background: #ebedf0; border: none; cursor: pointer; border-left: 1px solid #ddd; }
        
        .edit-dropdown { padding: 10px; background: #f0f2f5; border-top: 1px solid #ddd; display: none; }
        .edit-dropdown.open { display: block; }
        .editor-input { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.8rem; }

        .command-grid { padding: 15px; overflow-y: auto; flex-grow: 1; }
        .btn-danger { background: #ff4757; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 10px; }

        /* Column 2: Transcript */
        #chat-section { flex-grow: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; position: relative; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-examiner { align-self: flex-end; background: #dcf8c6; }
        .msg-candidate { align-self: flex-start; background: #fff; }
        .msg-time { display: block; font-size: 0.7rem; color: #888; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div id="audio-lock">
    <h2>Bank Interview System</h2>
    <p>Please click to activate control panel sounds and tools.</p>
    <button onclick="unlockAudio()" style="padding: 15px 40px; background:#0084ff; color:white; border:none; border-radius:5px; cursor:pointer;">Activate Dashboard</button>
</div>

<div id="sidebar">
    <div class="sidebar-header">Live Candidates</div>
    <div id="candidate-list"></div>
</div>

<div id="content-wrapper">
    <div id="command-section">
        <div class="section-header">
            Control Panel: <span id="current-category-label" style="color:#0084ff">Select User</span>
        </div>
        
        <div id="typing-indicator" style="padding: 5px 20px; font-size: 0.8rem; color: #1abc9c; height: 20px;"></div>
        
        <div class="command-grid" id="command-buttons">
            <p style="color: #888; text-align: center; margin-top: 20px;">Select a candidate to load controls.</p>
        </div>
    </div>

    <div id="chat-section">
        <div class="section-header">Transcript: <strong id="selected-name">None</strong></div>
        <div id="chat-window"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentTarget = "";
    let currentTargetId = ""; 
    const loginSound = new Audio('login.mp3');
    const submitSound = new Audio('submit.mp3');

    // POINT 3 & 5: Updated task library with JSON object mapping and Default flags
    const taskLibrary = [
        { file: "welcome.html", category: "general", isDefault: true, name: "Welcome Screen" },
        { file: "bio.html", category: "general", isDefault: false, name: "Personal Bio Form" },
        { file: "cd_form.html", category: "banking", isDefault: true, name: "Specialty CD Form" },
        { file: "affidavit.html", category: "banking", isDefault: false, name: "Affidavit Signature" },
        { file: "analysis.html", category: "data", isDefault: true, name: "Data Analysis Task" },
        { file: "logic.html", category: "data", isDefault: false, name: "System Logic Test" }
    ];

    function unlockAudio() {
        loginSound.play().then(() => {
            loginSound.pause();
            document.getElementById('audio-lock').style.display = 'none';
        });
    }

    // POINT 6: Restore state on refresh
    socket.on('sync_sessions', (candidates) => {
        document.getElementById('candidate-list').innerHTML = "";
        for (let id in candidates) {
            addCandidateToUI(candidates[id]);
            // If the examiner was viewing this person before, reload their transcript
            if (candidates[id].id === currentTargetId) {
                reloadTranscript(candidates[id].transcript);
            }
        }
    });

    socket.on('candidate_online', (data) => {
        loginSound.play();
        addCandidateToUI(data);
    });

    function addCandidateToUI(data) {
        if(document.getElementById(`user-${data.id}`)) return;
        const list = document.getElementById('candidate-list');
        const item = document.createElement('div');
        item.className = 'candidate-item';
        item.id = `user-${data.id}`;
        item.innerHTML = `<strong>${data.name}</strong> <span class="cat-tag">${data.category}</span>`;
        item.onclick = () => selectCandidate(data.name, data.category, data.id);
        list.appendChild(item);
    }

    function selectCandidate(name, category, id) {
        currentTarget = name;
        currentTargetId = id;
        document.getElementById('selected-name').innerText = name;
        document.getElementById('current-category-label').innerText = category.toUpperCase();
        document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`user-${id}`);
        if(activeItem) activeItem.classList.add('active');
        loadCategoryCommands(category);
    }

    function loadCategoryCommands(category) {
        const grid = document.getElementById('command-buttons');
        grid.innerHTML = `<button class="btn-danger" onclick="markWrong()">❌ Mark Last Answer Wrong</button><hr>`;

        const filteredTasks = taskLibrary.filter(t => t.category === category);
        filteredTasks.forEach((task, index) => {
            const container = document.createElement('div');
            container.className = "command-container";
            container.innerHTML = `
                <div class="command-main">
                    <button class="btn-send-now" onclick="sendTask('${task.file}', ${index})">
                        ${task.isDefault ? '⭐ ' : ''}Send: ${task.name}
                    </button>
                    <button class="btn-edit-toggle" onclick="toggleEdit(${index})">⚙️ Edit</button>
                </div>
                <div id="edit-${index}" class="edit-dropdown">
                    <input type="text" id="h-${index}" class="editor-input" placeholder="Custom Header">
                    <input type="text" id="s-${index}" class="editor-input" placeholder="Custom Sub-header">
                </div>
            `;
            grid.appendChild(container);
        });
    }

    function toggleEdit(index) {
        const drop = document.getElementById(`edit-${index}`);
        drop.classList.toggle('open');
    }

    function markWrong() {
        if(!currentTargetId) return alert("Select a candidate.");
        socket.emit('mark_wrong', { candidateId: currentTargetId, message: "Validation Failed: Form Reset." });
        addMessage('examiner', `<span style="color:red">⚠️ Error targeted to "error-div" for ${currentTarget}</span>`);
    }

    function sendTask(screenFile, index) {
        if(!currentTargetId) return alert("Select a candidate.");
        const customH = document.getElementById(`h-${index}`).value;
        const customS = document.getElementById(`s-${index}`).value;

        socket.emit('trigger_screen', { 
            candidateId: currentTargetId, 
            screenFile: screenFile,
            header: customH,
            subHeader: customS
        });
        addMessage('examiner', `Switched screen to: <strong>${screenFile}</strong>`);
    }

    socket.on('notify_submission', (data) => {
        if(data.name === currentTarget) {
            submitSound.play();
            addMessage('candidate', `<strong>[Submission: ${data.screenFile}]</strong><br>${data.answer}`);
        }
    });

    function reloadTranscript(transcript) {
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        transcript.forEach(entry => {
            addMessage('candidate', `<strong>[${entry.task}]</strong><br>${entry.answer}`);
        });
    }

    function addMessage(sender, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg msg-${sender}`;
        div.innerHTML = `${text} <span class="msg-time">${new Date().toLocaleTimeString()}</span>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    socket.on('is_typing', (name) => {
        if(name === currentTarget) {
            document.getElementById('typing-indicator').innerText = name + " is interacting with form...";
            setTimeout(() => { document.getElementById('typing-indicator').innerText = ""; }, 2000);
        }
    });
</script>
</body>
</html>
