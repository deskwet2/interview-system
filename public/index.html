<!DOCTYPE html>
<html>
<head>
    <title>Candidate Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        #app { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        
        .vacancy-card { border: 2px solid #eee; border-radius: 8px; padding: 15px; margin: 10px 0; cursor: pointer; transition: 0.3s; text-align: left; }
        .vacancy-card:hover { border-color: #007bff; background: #f8fbff; }
        .vacancy-card.selected { border-color: #007bff; background: #e7f3ff; }
        
        input[type="text"], textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; }
        
        .hidden { display: none; }
        #status-area { margin-top: 20px; min-height: 100px; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .file-upload-zone { border: 2px dashed #bbb; padding: 20px; border-radius: 8px; margin: 10px 0; color: #666; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Step 1: Vacancy Selection -->
    <div id="setup-screen">
        <h2>Available Vacancies</h2>
        <p>Select a role to begin your interview</p>
        
        <div class="vacancy-card" onclick="selectRole(this, 'banking')">
            <strong>🏦 Customer Account Manager</strong><br>
            <small>Banking Operations & Customer Relations</small>
        </div>

        <div class="vacancy-card" onclick="selectRole(this, 'data')">
            <strong>📊 Data Analyst</strong><br>
            <small>Financial Reporting & System Logic</small>
        </div>

        <div class="vacancy-card" onclick="selectRole(this, 'general')">
            <strong>🏢 Administrative Officer</strong><br>
            <small>General Office Management</small>
        </div>

        <input type="text" id="name-input" placeholder="Enter Full Name" style="margin-top: 20px;">
        <button id="join-btn" onclick="startInterview()">Enter Interview Room</button>
    </div>

    <!-- Step 2: Live Interview Room -->
    <div id="interview-screen" class="hidden">
        <h3 id="welcome-msg"></h3>
        <hr>
        <div id="status-area">
            <p id="instruction">Waiting for the examiner to initialize the first task...</p>
        </div>
        <div id="task-container"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let candidateName = "";
    let selectedCategory = "";

    function selectRole(element, category) {
        document.querySelectorAll('.vacancy-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        selectedCategory = category;
    }

    function startInterview() {
        candidateName = document.getElementById('name-input').value;
        if(!candidateName || !selectedCategory) {
            return alert("Please enter your name and select a vacancy.");
        }

        socket.emit('join_interview', { name: candidateName, category: selectedCategory });

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('interview-screen').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = candidateName;
    }

    socket.on('new_task', (data) => {
        const taskName = data.taskName;
        const statusArea = document.getElementById('status-area');
        const container = document.getElementById('task-container');
        container.innerHTML = ""; 

        if(taskName === 'Processing') {
            statusArea.innerHTML = `<div class="loader"></div><p><strong>Processing...</strong></p>`;
            return;
        }

        statusArea.innerHTML = `<h3>Current Task: ${taskName}</h3>`;

        if (taskName.includes("Form") || taskName.includes("Task") || taskName.includes("Bio")) {
            container.innerHTML = `
                <textarea id="task-ans" placeholder="Type your response here..." rows="4"></textarea>
                <button onclick="submitResponse('${taskName}')">Submit Work</button>
            `;
        } 
        else if (taskName.includes("Upload") || taskName.includes("Affidavit")) {
            container.innerHTML = `
                <div class="file-upload-zone">
                    <p>Click to select or drag file here</p>
                    <input type="file" id="file-input">
                </div>
                <button onclick="submitFile('${taskName}')">Upload & Submit</button>
            `;
        }
        else if (taskName === "Welcome Screen") {
            container.innerHTML = `<p>Welcome to the official portal. Please wait for further instructions.</p>`;
        }
        else {
            container.innerHTML = `
                <p>Please perform the action required for: <strong>${taskName}</strong></p>
                <button onclick="submitResponse('${taskName}')">Acknowledge / Complete</button>
            `;
        }

        const input = document.getElementById('task-ans');
        if(input) {
            input.onfocus = () => socket.emit('typing', candidateName);
        }
    });

    socket.on('wrong_answer', (data) => {
        const statusArea = document.getElementById('status-area');
        const alertDiv = document.createElement('div');
        alertDiv.style.cssText = "background:#ffebee; color:#c62828; padding:10px; border-radius:5px; margin-bottom:10px; border:1px solid #ef9a9a;";
        alertDiv.innerHTML = `<strong>⚠️ ${data.message}</strong>`;
        
        statusArea.prepend(alertDiv);
        
        document.getElementById('app').style.animation = "shake 0.5s";
        setTimeout(() => document.getElementById('app').style.animation = "", 500);
    });

    function submitResponse(task) {
        const val = document.getElementById('task-ans') ? document.getElementById('task-ans').value : "Task Completed";
        socket.emit('task_submitted', {
            name: candidateName,
            answer: `[${task}] Response: ${val}`
        });
        showWaiting();
    }

    function submitFile(task) {
        const fileInput = document.getElementById('file-input');
        const fileName = (fileInput.files && fileInput.files[0]) ? fileInput.files[0].name : "document.pdf";
        
        socket.emit('task_submitted', {
            name: candidateName,
            answer: `Uploaded ${fileName} for ${task}`,
            fileUrl: "#", 
            fileName: fileName
        });
        showWaiting();
    }

    function showWaiting() {
        document.getElementById('task-container').innerHTML = "";
        document.getElementById('status-area').innerHTML = "<p>Task submitted. Waiting for next instruction...</p>";
    }
</script>
</body>
</html>
